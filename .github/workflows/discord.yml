name: YouTube and Steam to Discord

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-watcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Print schedule debug info
        run: |
          echo "UTC time: $(date -u)"
          echo "Local runner time: $(date)"
          echo "Workflow run number: ${{ github.run_number }}"
          echo "Event name: ${{ github.event_name }}"
          echo "Schedule expression: ${{ github.event.schedule }}"

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CHANNEL_IDS: ${{ vars.YOUTUBE_CHANNEL_IDS }}
          STEAM_APP_IDS: ${{ vars.STEAM_APP_IDS }}
        run: python watcher.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update watcher state"
          git push
